<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقع ألعابك المفضلة - مثل بوكي</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1a1a2e;
            color: white;
            margin: 0;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #e94560;
        }
        /* شبكة الألعاب */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            padding: 20px;
        }
        /* كرت اللعبة */
        .game-card {
            background-color: #16213e;
            border-radius: 12px;
            overflow: hidden;
            text-align: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            transition: transform 0.2s;
            cursor: pointer;
            text-decoration: none;
            color: white;
        }
        .game-card:hover {
            transform: scale(1.05);
            border: 2px solid #e94560;
        }
        .game-card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
        }
        .game-card p {
            padding: 10px;
            margin: 0;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>🎮 بوابتك للألعاب السريعة 🎮</h1>

    <div class="games-grid">
        
        <!-- لعبة 1 -->
        <a href="https://famobi.com" class="game-card" target="_blank">
            <img src="https://famobi.com" alt="Om Nom Run">
            <p>أوم نوم ران</p>
        </a>

        <!-- لعبة 2 -->
        <a href="https://famobi.com" class="game-card" target="_blank">
            <img src="https://famobi.com" alt="Table Tennis">
            <p>تنس الطاولة</p>
        </a>

        <!-- لعبة 3 (يمكنك إضافة المزيد هنا بنفس الطريقة) -->

    </div>

</body>
</html>
